<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>제주 갈치 어장 해역</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --ocean-deep: #0a1628;
    --ocean-mid: #0d2444;
    --ocean-light: #1a3a5c;
    --ocean-surface: #1e5f8e;
    --zone-fill: rgba(0, 200, 180, 0.15);
    --zone-stroke: #00c8b4;
    --jeju-color: #4ade80;
    --text-primary: #e8f4f8;
    --text-secondary: #8ab4cc;
    --accent: #00c8b4;
    --grid-line: rgba(255,255,255,0.06);
    --land: #2d4a3e;
    --land-stroke: #3d6b52;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--ocean-deep);
    color: var(--text-primary);
    font-family: 'Noto Sans KR', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 2rem 1rem;
  }

  header {
    text-align: center;
    margin-bottom: 2rem;
    animation: fadeDown 0.8s ease both;
  }

  header .label {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.25em;
    color: var(--accent);
    text-transform: uppercase;
    margin-bottom: 0.5rem;
  }

  header h1 {
    font-size: 1.6rem;
    font-weight: 700;
    color: var(--text-primary);
    margin-bottom: 0.3rem;
  }

  header p {
    font-size: 0.85rem;
    color: var(--text-secondary);
    font-weight: 300;
  }

  .map-container {
    position: relative;
    width: 100%;
    max-width: 820px;
    background: var(--ocean-mid);
    border: 1px solid rgba(0,200,180,0.2);
    border-radius: 12px;
    overflow: hidden;
    animation: fadeUp 0.8s ease 0.2s both;
  }

  svg#map {
    width: 100%;
    height: auto;
    display: block;
  }

  .info-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 1px;
    background: rgba(255,255,255,0.05);
    border-top: 1px solid rgba(0,200,180,0.15);
    animation: fadeUp 0.8s ease 0.4s both;
  }

  .info-card {
    background: var(--ocean-mid);
    padding: 1rem 1.2rem;
    text-align: center;
  }

  .info-card .val {
    font-family: 'Space Mono', monospace;
    font-size: 1rem;
    font-weight: 700;
    color: var(--accent);
    margin-bottom: 0.25rem;
  }

  .info-card .desc {
    font-size: 0.72rem;
    color: var(--text-secondary);
    line-height: 1.4;
  }

  .legend {
    display: flex;
    gap: 1.5rem;
    justify-content: center;
    flex-wrap: wrap;
    padding: 1rem 1.5rem;
    border-top: 1px solid rgba(255,255,255,0.06);
    background: var(--ocean-mid);
  }

  .legend-item {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    font-size: 0.78rem;
    color: var(--text-secondary);
  }

  .legend-dot {
    width: 10px; height: 10px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .legend-line {
    width: 20px; height: 2px;
    flex-shrink: 0;
  }

  .legend-rect {
    width: 14px; height: 10px;
    border-radius: 2px;
    flex-shrink: 0;
  }

  @keyframes fadeDown {
    from { opacity: 0; transform: translateY(-16px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .pulse {
    animation: pulse 2s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 0.7; }
    50% { opacity: 1; }
  }
</style>
</head>
<body>

<header>
  <div class="label">Fishing Zone Visualization</div>
  <h1>제주 갈치 어장 해역 범위</h1>
  <p>CNN 모델 입력 데이터 공간 범위 · 위도 32.0~34.0°N · 경도 125.0~127.5°E</p>
</header>

<div class="map-container">
  <svg id="map" viewBox="0 0 820 580" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <!-- 배경 그라디언트 -->
      <linearGradient id="oceanGrad" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="#0d2444"/>
        <stop offset="100%" stop-color="#071525"/>
      </linearGradient>

      <!-- 어장 범위 그라디언트 -->
      <radialGradient id="zoneGlow" cx="50%" cy="50%" r="50%">
        <stop offset="0%" stop-color="#00c8b4" stop-opacity="0.08"/>
        <stop offset="100%" stop-color="#00c8b4" stop-opacity="0.02"/>
      </radialGradient>

      <!-- 격자 패턴 -->
      <pattern id="grid" width="54.6" height="58" patternUnits="userSpaceOnUse" x="0" y="0">
        <line x1="0" y1="0" x2="0" y2="58" stroke="rgba(255,255,255,0.04)" stroke-width="0.5"/>
        <line x1="0" y1="0" x2="54.6" y2="0" stroke="rgba(255,255,255,0.04)" stroke-width="0.5"/>
      </pattern>

      <!-- 클립 -->
      <clipPath id="mapClip">
        <rect x="60" y="30" width="700" height="520"/>
      </clipPath>
    </defs>

    <!-- 바다 배경 -->
    <rect width="820" height="580" fill="url(#oceanGrad)"/>
    <rect x="60" y="30" width="700" height="520" fill="url(#grid)"/>

    <!--
      좌표 매핑:
      경도 124.0~129.0 → x: 60~760 (700px / 5도 = 140px/도)
      위도 31.0~35.5   → y: 30~550 (520px / 4.5도 = 115.6px/도)

      x = 60 + (lon - 124.0) * 140
      y = 30 + (35.5 - lat) * 115.6
    -->

    <!-- ── 조업 해역 범위 (32.0~34.0N / 125.0~127.5E) ── -->
    <!--
      x1 = 60 + (125.0 - 124.0)*140 = 60+140 = 200
      x2 = 60 + (127.5 - 124.0)*140 = 60+490 = 550
      y1 = 30 + (35.5 - 34.0)*115.6 = 30+173.4 = 203
      y2 = 30 + (35.5 - 32.0)*115.6 = 30+404.6 = 435
    -->
    <rect x="200" y="203" width="350" height="232"
          fill="url(#zoneGlow)" rx="0"/>
    <rect x="200" y="203" width="350" height="232"
          fill="rgba(0,200,180,0.07)"
          stroke="#00c8b4" stroke-width="1.8"
          stroke-dasharray="8,4" rx="0" class="pulse"/>

    <!-- 범위 라벨 -->
    <text x="375" y="222" text-anchor="middle" font-family="Space Mono" font-size="10" fill="#00c8b4" opacity="0.9">32.0°N ~ 34.0°N / 125.0°E ~ 127.5°E</text>

    <!-- ── 격자선 및 좌표 레이블 ── -->
    <!-- 경도선: 124, 125, 126, 127, 128, 129 -->
    <g stroke="rgba(255,255,255,0.07)" stroke-width="0.5">
      <line x1="60"  y1="30" x2="60"  y2="550"/>  <!-- 124E -->
      <line x1="200" y1="30" x2="200" y2="550"/>  <!-- 125E -->
      <line x1="340" y1="30" x2="340" y2="550"/>  <!-- 126E -->
      <line x1="480" y1="30" x2="480" y2="550"/>  <!-- 127E -->
      <line x1="620" y1="30" x2="620" y2="550"/>  <!-- 128E -->
      <line x1="760" y1="30" x2="760" y2="550"/>  <!-- 129E -->
    </g>
    <!-- 위도선: 31, 32, 33, 34, 35 -->
    <g stroke="rgba(255,255,255,0.07)" stroke-width="0.5">
      <!-- 35N: y=30+(35.5-35)*115.6=30+57.8=88 -->
      <line x1="60" y1="88"  x2="760" y2="88"/>
      <!-- 34N: y=30+(35.5-34)*115.6=30+173.4=203 -->
      <line x1="60" y1="203" x2="760" y2="203"/>
      <!-- 33N: y=30+(35.5-33)*115.6=30+289=319 -->
      <line x1="60" y1="319" x2="760" y2="319"/>
      <!-- 32N: y=30+(35.5-32)*115.6=30+404.6=435 -->
      <line x1="60" y1="435" x2="760" y2="435"/>
      <!-- 31N: y=30+(35.5-31)*115.6=30+520=550 -->
      <line x1="60" y1="550" x2="760" y2="550"/>
    </g>

    <!-- 경도 레이블 -->
    <g font-family="Space Mono" font-size="10" fill="rgba(255,255,255,0.35)" text-anchor="middle">
      <text x="60"  y="570">124°E</text>
      <text x="200" y="570">125°E</text>
      <text x="340" y="570">126°E</text>
      <text x="480" y="570">127°E</text>
      <text x="620" y="570">128°E</text>
      <text x="760" y="570">129°E</text>
    </g>
    <!-- 위도 레이블 -->
    <g font-family="Space Mono" font-size="10" fill="rgba(255,255,255,0.35)" text-anchor="end">
      <text x="52" y="92">35°N</text>
      <text x="52" y="207">34°N</text>
      <text x="52" y="323">33°N</text>
      <text x="52" y="439">32°N</text>
      <text x="52" y="554">31°N</text>
    </g>

    <!-- ── 육지 (한반도 남부 간략화) ── -->
    <!--
      남해안 서쪽: ~126E,34.5N → x=340,y=116
      목포 근처: 126.4E,34.8N → x=396,y=81
      완도: 126.7E,34.3N → x=438,y=139
      여수: 127.7E,34.7N → x=578,y=92
      부산: 129.0E,35.1N → x=760,y=46
    -->
    <path d="M60,88 L120,75 L180,68 L240,72 L300,80 L340,78 L396,65 L438,105 L480,98 L520,88 L578,74 L620,78 L680,60 L760,46 L760,30 L60,30 Z"
          fill="#2a3d2e" stroke="#3d5e42" stroke-width="0.8"/>

    <!-- 남해 섬들 간략 -->
    <!-- 거제도: 128.6E,34.85N → x=702,y=77 -->
    <ellipse cx="702" cy="82" rx="14" ry="8" fill="#2a3d2e" stroke="#3d5e42" stroke-width="0.5"/>
    <!-- 완도: 126.8E,34.3N → x=451,y=139 -->
    <ellipse cx="451" cy="139" rx="9" ry="5" fill="#2a3d2e" stroke="#3d5e42" stroke-width="0.5"/>
    <!-- 진도: 126.3E,34.4N → x=382,y=128 -->
    <ellipse cx="382" cy="128" rx="10" ry="6" fill="#2a3d2e" stroke="#3d5e42" stroke-width="0.5"/>

    <!-- ── 제주도 ── -->
    <!--
      제주도 중심: 126.5E,33.4N → x=410,y=242
      동서 73km ≈ 0.66도 → ±0.33도 → ±46px
      남북 31km ≈ 0.28도 → ±0.14도 → ±16px
    -->
    <ellipse cx="410" cy="242" rx="46" ry="16"
             fill="#2f5c3a" stroke="#4ade80" stroke-width="1.5"/>
    <text x="410" y="247" text-anchor="middle"
          font-family="Noto Sans KR" font-size="11" font-weight="700"
          fill="#4ade80">제주도</text>

    <!-- 제주도 중심 십자선 -->
    <line x1="406" y1="242" x2="414" y2="242" stroke="#4ade80" stroke-width="1.2" opacity="0.7"/>
    <line x1="410" y1="238" x2="410" y2="246" stroke="#4ade80" stroke-width="1.2" opacity="0.7"/>

    <!-- ── 이어도 ── -->
    <!--
      이어도: 125.18E,32.12N → x=60+(125.18-124)*140=60+165.2=225, y=30+(35.5-32.12)*115.6=30+390.8=421
    -->
    <circle cx="225" cy="421" r="4" fill="#f59e0b" stroke="#fbbf24" stroke-width="1"/>
    <text x="236" y="419" font-family="Noto Sans KR" font-size="9.5" fill="#fbbf24">이어도</text>

    <!-- ── 방향 화살표 (어장 범위 꼭짓점) ── -->
    <!-- 북쪽 경계 표시 -->
    <line x1="375" y1="203" x2="375" y2="215" stroke="#00c8b4" stroke-width="1" marker-end="none"/>
    <!-- 남쪽 경계 표시 -->
    <line x1="375" y1="435" x2="375" y2="423" stroke="#00c8b4" stroke-width="1"/>

    <!-- 어장 범위 코너 마커 -->
    <g stroke="#00c8b4" stroke-width="1.5" fill="none">
      <!-- 좌상 -->
      <path d="M200,213 L200,203 L210,203"/>
      <!-- 우상 -->
      <path d="M540,203 L550,203 L550,213"/>
      <!-- 좌하 -->
      <path d="M200,425 L200,435 L210,435"/>
      <!-- 우하 -->
      <path d="M540,435 L550,435 L550,425"/>
    </g>

    <!-- 어장 범위 치수선 -->
    <!-- 상단: 125E~127.5E -->
    <g stroke="#00c8b4" stroke-width="0.7" opacity="0.5">
      <line x1="200" y1="192" x2="550" y2="192"/>
      <line x1="200" y1="188" x2="200" y2="196"/>
      <line x1="550" y1="188" x2="550" y2="196"/>
    </g>
    <text x="375" y="190" text-anchor="middle" font-family="Space Mono" font-size="9"
          fill="#00c8b4" opacity="0.7">← 2.5° (약 240km) →</text>

    <!-- 우측: 32N~34N -->
    <g stroke="#00c8b4" stroke-width="0.7" opacity="0.5">
      <line x1="562" y1="203" x2="562" y2="435"/>
      <line x1="558" y1="203" x2="566" y2="203"/>
      <line x1="558" y1="435" x2="566" y2="435"/>
    </g>
    <text x="582" y="325" text-anchor="middle" font-family="Space Mono" font-size="9"
          fill="#00c8b4" opacity="0.7" transform="rotate(90,582,325)">← 2.0° (약 222km) →</text>

    <!-- ── 수심 표현 (어장 내 물결 효과) ── -->
    <g clip-path="url(#mapClip)" opacity="0.15">
      <path d="M200,280 Q270,275 340,280 Q410,285 480,280 Q520,276 550,280"
            fill="none" stroke="#00c8b4" stroke-width="0.5"/>
      <path d="M200,310 Q280,305 360,310 Q440,315 550,308"
            fill="none" stroke="#00c8b4" stroke-width="0.5"/>
      <path d="M200,340 Q270,335 350,341 Q430,347 550,338"
            fill="none" stroke="#00c8b4" stroke-width="0.5"/>
      <path d="M200,370 Q290,365 380,371 Q460,377 550,368"
            fill="none" stroke="#00c8b4" stroke-width="0.5"/>
      <path d="M200,400 Q290,395 375,401 Q460,407 550,398"
            fill="none" stroke="#00c8b4" stroke-width="0.5"/>
    </g>

    <!-- ── 타이틀 오버레이 ── -->
    <rect x="68" y="38" width="180" height="52" rx="4"
          fill="rgba(10,22,40,0.85)" stroke="rgba(0,200,180,0.3)" stroke-width="0.8"/>
    <text x="78" y="55" font-family="Space Mono" font-size="9" fill="#00c8b4">JEJU HAIRTAIL ZONE</text>
    <text x="78" y="70" font-family="Noto Sans KR" font-size="10" fill="rgba(255,255,255,0.8)">갈치 어장 분석 범위</text>
    <text x="78" y="83" font-family="Space Mono" font-size="8" fill="rgba(255,255,255,0.4)">CNN Model · KOSIS Data</text>

  </svg>

  <!-- 하단 정보 카드 -->
  <div class="info-grid">
    <div class="info-card">
      <div class="val">32.0° ~ 34.0°N</div>
      <div class="desc">위도 범위<br>남북 약 222km</div>
    </div>
    <div class="info-card">
      <div class="val">125.0° ~ 127.5°E</div>
      <div class="desc">경도 범위<br>동서 약 240km</div>
    </div>
    <div class="info-card">
      <div class="val">약 53,280 km²</div>
      <div class="desc">총 해역 면적<br>갈치 주어장 포함</div>
    </div>
    <div class="info-card">
      <div class="val">CMEMS · KOSIS</div>
      <div class="desc">데이터 출처<br>NC + 어획량 통계</div>
    </div>
  </div>

  <!-- 범례 -->
  <div class="legend">
    <div class="legend-item">
      <div class="legend-rect" style="background:rgba(0,200,180,0.15);border:1.5px dashed #00c8b4;"></div>
      <span>갈치 어장 분석 범위</span>
    </div>
    <div class="legend-item">
      <div class="legend-dot" style="background:#4ade80;"></div>
      <span>제주도</span>
    </div>
    <div class="legend-item">
      <div class="legend-dot" style="background:#f59e0b;"></div>
      <span>이어도</span>
    </div>
    <div class="legend-item">
      <div class="legend-dot" style="background:#2f5c3a;border:1px solid #3d5e42;"></div>
      <span>육지</span>
    </div>
    <div class="legend-item">
      <div class="legend-line" style="background:rgba(255,255,255,0.07);"></div>
      <span>위경도 격자선 (1°)</span>
    </div>
  </div>
</div>

</body>
</html>
